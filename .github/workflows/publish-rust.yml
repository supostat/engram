name: Publish Rust crates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual publish)"
        type: boolean
        default: true

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates (dependency order)
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          for crate in engram-hnsw engram-router engram-storage engram-llm-client engram-embeddings engram-judge engram-consolidate engram-memory; do
            echo "Publishing $crate..."
            set +e
            OUTPUT=$(cargo publish -p $crate $ARGS 2>&1)
            EXIT=$?
            set -e
            echo "$OUTPUT"
            if [ $EXIT -eq 0 ]; then
              if [ "${{ inputs.dry_run }}" != "true" ]; then
                sleep 30  # wait for crates.io index update
              fi
            elif echo "$OUTPUT" | grep -q "already exists on crates.io"; then
              echo "Skipping $crate (already published at this version)"
            else
              echo "::error::cargo publish failed for $crate"
              exit $EXIT
            fi
          done
