name: Publish Rust crates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual publish)"
        type: boolean
        default: true

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates (dependency order)
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          for crate in engram-hnsw engram-router engram-storage engram-llm-client engram-embeddings engram-judge engram-consolidate engram-memory; do
            VERSION=$(cargo metadata --no-deps --format-version=1 \
              | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print(next(p['version'] for p in pkgs if p['name']=='$crate'))")
            if [ "${{ inputs.dry_run }}" != "true" ] \
                && curl -sf -o /dev/null "https://crates.io/api/v1/crates/$crate/$VERSION"; then
              echo "Skipping $crate@$VERSION (already published)"
              continue
            fi
            echo "Publishing $crate@$VERSION..."
            cargo publish -p $crate $ARGS
            if [ "${{ inputs.dry_run }}" != "true" ]; then
              sleep 30  # wait for crates.io index update
            fi
          done
